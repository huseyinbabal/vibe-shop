# Production-benzeri prova (SPEC §13): PG + Keycloak + API + web tek projede.
# Dev compose'dan bağımsızdır ve farklı portlar kullanır (yan yana koşabilir):
#   web http://localhost:3000 · keycloak http://localhost:8084
# Secrets are dev-only defaults; override them via environment when deploying.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vibeshop
      POSTGRES_PASSWORD: vibeshop
      POSTGRES_DB: vibeshop
    volumes:
      - vibeshop-dokploy-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vibeshop -d vibeshop"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot: applies migrations in filename order exactly once each (see
  # migrations/apply.sh). SQL baked into the image — no bind mounts, so this
  # works when Dokploy clones the repo into its own container.
  migrate:
    build: ./migrations
    image: ghcr.io/huseyinbabal/vibe-shop-migrate:latest
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGUSER: vibeshop
      PGPASSWORD: vibeshop
      PGDATABASE: vibeshop

  keycloak:
    build: ./keycloak
    image: ghcr.io/huseyinbabal/vibe-shop-keycloak:latest
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      # Issuer must match what browsers/mobile use from the host.
      KC_HOSTNAME: http://localhost:8084
    ports:
      - "8084:8080"

  api:
    build: .
    image: ghcr.io/huseyinbabal/vibe-shop-api:latest
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://vibeshop:vibeshop@postgres:5432/vibeshop?sslmode=disable
      # Issuer as it appears in tokens (host-visible) vs. where this container
      # can actually reach Keycloak (compose-internal).
      KEYCLOAK_ISSUER_URL: http://localhost:8084/realms/vibe-shop
      KEYCLOAK_INTERNAL_URL: http://keycloak:8080/realms/vibe-shop
      KEYCLOAK_ADMIN_CLIENT_SECRET: dev-backend-secret
    restart: unless-stopped

  web:
    build: ./frontend
    image: ghcr.io/huseyinbabal/vibe-shop-web:latest
    depends_on:
      - api
    ports:
      - "3000:80"

volumes:
  vibeshop-dokploy-pg:
