services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vibeshop
      POSTGRES_PASSWORD: vibeshop
      POSTGRES_DB: vibeshop
    ports:
      - "5432:5432"
    volumes:
      - vibeshop-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vibeshop -d vibeshop"]
      interval: 5s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.3
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    ports:
      - "8081:8080"
    volumes:
      - ./keycloak:/opt/keycloak/data/import:ro

volumes:
  vibeshop-postgres-data:
