services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vibeshop
      POSTGRES_PASSWORD: vibeshop
      POSTGRES_DB: vibeshop
    ports:
      # Host portu .env'deki POSTGRES_PORT ile değiştirilebilir (varsayılan 5432);
      # 5432'nin başka bir projede dolu olduğu geliştirme makineleri için.
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - vibeshop-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vibeshop -d vibeshop"]
      interval: 5s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.3
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    ports:
      - "8081:8080"
    volumes:
      - ./keycloak:/opt/keycloak/data/import:ro

  # Dev-only, tek seferlik: master realm da HTTP'ye izin versin ki admin
  # konsolu (http://localhost:8081) "HTTPS required" demesin. vibe-shop
  # realm'i bunu import dosyasındaki sslRequired=none ile zaten yapıyor.
  keycloak-init:
    image: quay.io/keycloak/keycloak:26.3
    restart: "no"
    depends_on:
      - keycloak
    entrypoint: /bin/bash
    command:
      - -c
      - |
        until /opt/keycloak/bin/kcadm.sh config credentials --server http://keycloak:8080 --realm master --user admin --password admin >/dev/null 2>&1; do
          sleep 2
        done
        /opt/keycloak/bin/kcadm.sh update realms/master -s sslRequired=NONE
        echo "master realm: sslRequired=NONE"

volumes:
  vibeshop-postgres-data:
